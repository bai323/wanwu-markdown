<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Obsidian export case</title>
  <desc id="desc">A sanitized Obsidian vault export showing Markdown, JSONL, and branch report outputs.</desc>
  <rect width="1200" height="720" fill="#f5f6f8"/>
  <rect x="72" y="58" width="320" height="604" rx="10" fill="#ffffff" stroke="#dde2ea"/>
  <text x="112" y="108" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#17191f">Obsidian output</text>
  <text x="112" y="136" font-family="Inter, Arial, sans-serif" font-size="14" fill="#667085">Local vault, local files.</text>
  <rect x="112" y="180" width="240" height="42" rx="7" fill="#f9fafb" stroke="#dde2ea"/>
  <text x="130" y="206" font-family="Inter, Arial, sans-serif" font-size="13" fill="#17191f">Vault: Notes</text>
  <rect x="112" y="246" width="240" height="42" rx="7" fill="#f9fafb" stroke="#dde2ea"/>
  <text x="130" y="272" font-family="Inter, Arial, sans-serif" font-size="13" fill="#17191f">Folder: 万物Markdown/采集资产</text>
  <rect x="112" y="324" width="240" height="48" rx="7" fill="#1f6f5b"/>
  <text x="232" y="354" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#ffffff">存入 Obsidian</text>
  <rect x="462" y="58" width="666" height="604" rx="10" fill="#ffffff" stroke="#dde2ea"/>
  <text x="502" y="108" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#17191f">Created files</text>
  <rect x="502" y="154" width="586" height="86" rx="8" fill="#f9fafb" stroke="#dde2ea"/>
  <text x="536" y="188" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#17191f">conversation.md</text>
  <text x="536" y="214" font-family="Inter, Arial, sans-serif" font-size="13" fill="#667085">Readable Markdown with source and branch metadata.</text>
  <rect x="502" y="270" width="586" height="86" rx="8" fill="#f9fafb" stroke="#dde2ea"/>
  <text x="536" y="304" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#17191f">dataset.jsonl</text>
  <text x="536" y="330" font-family="Inter, Arial, sans-serif" font-size="13" fill="#667085">Draft records for labeling and evaluation, not final training data.</text>
  <rect x="502" y="386" width="586" height="86" rx="8" fill="#f9fafb" stroke="#dde2ea"/>
  <text x="536" y="420" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#17191f">branch-report.html</text>
  <text x="536" y="446" font-family="Inter, Arial, sans-serif" font-size="13" fill="#667085">Visual branch comparison for review.</text>
  <rect x="502" y="518" width="586" height="76" rx="8" fill="#f2f7f5" stroke="#1f6f5b"/>
  <text x="536" y="552" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#17191f">Privacy note</text>
  <text x="536" y="578" font-family="Inter, Arial, sans-serif" font-size="13" fill="#667085">Public demos use sanitized or simulated content.</text>
</svg>
