<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Branch report case</title>
  <desc id="desc">A sanitized branch report comparing multiple assistant paths and model sources.</desc>
  <rect width="1200" height="720" fill="#f5f6f8"/>
  <rect x="54" y="46" width="1092" height="628" rx="10" fill="#ffffff" stroke="#dde2ea"/>
  <text x="94" y="96" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#17191f">HTML branch report</text>
  <text x="94" y="126" font-family="Inter, Arial, sans-serif" font-size="14" fill="#667085">Compare branches without exposing private conversation text.</text>
  <rect x="94" y="168" width="196" height="456" rx="8" fill="#f9fafb" stroke="#dde2ea"/>
  <text x="120" y="205" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#17191f">Branch points</text>
  <rect x="120" y="232" width="144" height="58" rx="7" fill="#ffffff" stroke="#1f6f5b"/>
  <text x="136" y="257" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#17191f">Fork 1</text>
  <text x="136" y="277" font-family="Inter, Arial, sans-serif" font-size="12" fill="#667085">3 paths</text>
  <rect x="120" y="312" width="144" height="58" rx="7" fill="#ffffff" stroke="#dde2ea"/>
  <text x="136" y="337" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#17191f">Fork 2</text>
  <text x="136" y="357" font-family="Inter, Arial, sans-serif" font-size="12" fill="#667085">2 paths</text>
  <rect x="120" y="392" width="144" height="58" rx="7" fill="#ffffff" stroke="#dde2ea"/>
  <text x="136" y="417" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#17191f">Fork 3</text>
  <text x="136" y="437" font-family="Inter, Arial, sans-serif" font-size="12" fill="#667085">4 paths</text>
  <rect x="334" y="168" width="238" height="456" rx="8" fill="#ffffff" stroke="#dde2ea"/>
  <text x="360" y="205" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#1f6f5b">Claude path</text>
  <text x="360" y="233" font-family="Inter, Arial, sans-serif" font-size="13" fill="#667085">More concise plan.</text>
  <line x1="360" y1="262" x2="528" y2="262" stroke="#dde2ea"/>
  <text x="360" y="300" font-family="Inter, Arial, sans-serif" font-size="13" fill="#17191f">1. clarify source</text>
  <text x="360" y="330" font-family="Inter, Arial, sans-serif" font-size="13" fill="#17191f">2. capture graph</text>
  <text x="360" y="360" font-family="Inter, Arial, sans-serif" font-size="13" fill="#17191f">3. export Markdown</text>
  <rect x="616" y="168" width="238" height="456" rx="8" fill="#ffffff" stroke="#dde2ea"/>
  <text x="642" y="205" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#3857b8">GPT path</text>
  <text x="642" y="233" font-family="Inter, Arial, sans-serif" font-size="13" fill="#667085">More implementation detail.</text>
  <line x1="642" y1="262" x2="810" y2="262" stroke="#dde2ea"/>
  <text x="642" y="300" font-family="Inter, Arial, sans-serif" font-size="13" fill="#17191f">1. build adapter</text>
  <text x="642" y="330" font-family="Inter, Arial, sans-serif" font-size="13" fill="#17191f">2. preserve branches</text>
  <text x="642" y="360" font-family="Inter, Arial, sans-serif" font-size="13" fill="#17191f">3. add report view</text>
  <rect x="898" y="168" width="196" height="456" rx="8" fill="#ffffff" stroke="#dde2ea"/>
  <text x="924" y="205" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#99642d">Local notes</text>
  <text x="924" y="233" font-family="Inter, Arial, sans-serif" font-size="13" fill="#667085">Human labels.</text>
  <line x1="924" y1="262" x2="1062" y2="262" stroke="#dde2ea"/>
  <text x="924" y="300" font-family="Inter, Arial, sans-serif" font-size="13" fill="#17191f">✓ useful</text>
  <text x="924" y="330" font-family="Inter, Arial, sans-serif" font-size="13" fill="#17191f">✓ keep source</text>
  <text x="924" y="360" font-family="Inter, Arial, sans-serif" font-size="13" fill="#17191f">! redact first</text>
</svg>
